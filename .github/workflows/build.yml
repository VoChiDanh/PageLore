name: PageLore CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

env:
  WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  THREAD_ID: ${{ secrets.DISCORD_WEBHOOK_THREAD_ID }}
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  ICON_URL: "https://gitlab.com/uploads/-/system/group/avatar/121690756/SinceRPG.png?width=48"
  THUMBNAIL_URL: "https://gitlab.com/uploads/-/system/group/avatar/121690756/SinceRPG.png?width=48"
  BOT_USERNAME: "PageLore Build"
  COLOR_PENDING: "16766720"
  COLOR_SUCCESS: "5763719"
  COLOR_FAIL: "15548997"
  NO_CHANGELOG_TEXT: "No specific changelog provided."
  FAIL_DESC_TEXT: "A syntax or compilation error occurred. Check the GitHub Actions log."

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Notify Discord build start
        id: notify_start
        if: env.WEBHOOK_URL != ''
        shell: bash
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          AUTHOR=$(git log -1 --pretty=%an)
          HASH=$(git log -1 --pretty=%h)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GRADLE_CMD="./gradlew"
          VERSION=$($GRADLE_CMD properties -q | grep "^version:" | awk '{print $2}' || echo "Unknown")
          [ -z "$(echo "$COMMIT_MSG" | tr -d '[:space:]')" ] && COMMIT_MSG="$NO_CHANGELOG_TEXT"

          jq -n \
            --arg author "$AUTHOR triggered a build for PageLore" \
            --arg desc "$COMMIT_MSG" \
            --arg footer "Version $VERSION - $HASH" \
            --arg timestamp "$TIMESTAMP" \
            --arg icon "$ICON_URL" \
            --arg thumb "$THUMBNAIL_URL" \
            --arg bot_name "$BOT_USERNAME" \
            --argjson color "$COLOR_PENDING" \
            '{
              username: $bot_name,
              avatar_url: $icon,
              embeds: [{
                color: $color,
                author: { name: $author, icon_url: $icon },
                title: "Building PageLore",
                description: $desc,
                thumbnail: { url: $thumb },
                footer: { text: $footer },
                timestamp: $timestamp
              }]
            }' > build_start.json

          WEBHOOK_ENDPOINT="${WEBHOOK_URL}?wait=true"
          if [ -n "$THREAD_ID" ]; then WEBHOOK_ENDPOINT="${WEBHOOK_URL}?thread_id=${THREAD_ID}&wait=true"; fi
          RESPONSE=$(curl -sS -X POST -H "Content-Type: application/json" -d @build_start.json "$WEBHOOK_ENDPOINT")
          MSG_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          if [ -n "$MSG_ID" ]; then echo "MSG_ID=$MSG_ID" >> "$GITHUB_ENV"; fi

      - name: Build with Gradle
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: Notify Discord success
        if: success() && env.WEBHOOK_URL != '' && env.MSG_ID != ''
        shell: bash
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          AUTHOR=$(git log -1 --pretty=%an)
          HASH=$(git log -1 --pretty=%h)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}' || echo "Unknown")
          [ -z "$(echo "$COMMIT_MSG" | tr -d '[:space:]')" ] && COMMIT_MSG="$NO_CHANGELOG_TEXT"

          jq -n \
            --arg author "$AUTHOR pushed an update for PageLore" \
            --arg desc "$COMMIT_MSG" \
            --arg footer "Version $VERSION - $HASH" \
            --arg timestamp "$TIMESTAMP" \
            --arg icon "$ICON_URL" \
            --arg thumb "$THUMBNAIL_URL" \
            --argjson color "$COLOR_SUCCESS" \
            '{
              embeds: [{
                color: $color,
                author: { name: $author, icon_url: $icon },
                title: "Build successful",
                description: $desc,
                thumbnail: { url: $thumb },
                footer: { text: $footer },
                timestamp: $timestamp
              }]
            }' > build_success.json

          JAR_FILE=$(find build/libs -maxdepth 1 -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" | head -n 1)
          WEBHOOK_ENDPOINT="${WEBHOOK_URL}/messages/${MSG_ID}"
          if [ -n "$THREAD_ID" ]; then WEBHOOK_ENDPOINT="${WEBHOOK_URL}/messages/${MSG_ID}?thread_id=${THREAD_ID}"; fi
          if [ -n "$JAR_FILE" ] && [ -f "$JAR_FILE" ]; then
            curl -sS -X PATCH -F "payload_json=<build_success.json;type=application/json" -F "file=@$JAR_FILE" "$WEBHOOK_ENDPOINT"
          else
            curl -sS -X PATCH -H "Content-Type: application/json" -d @build_success.json "$WEBHOOK_ENDPOINT"
          fi

      - name: Notify Discord failure
        if: failure() && env.WEBHOOK_URL != '' && env.MSG_ID != ''
        shell: bash
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          HASH=$(git log -1 --pretty=%h)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PIPELINE_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          [ -z "$(echo "$COMMIT_MSG" | tr -d '[:space:]')" ] && COMMIT_MSG="$FAIL_DESC_TEXT"

          jq -n \
            --arg url "$PIPELINE_URL" \
            --arg footer "Build failed - $HASH" \
            --arg timestamp "$TIMESTAMP" \
            --arg icon "$ICON_URL" \
            --arg desc "$COMMIT_MSG" \
            --argjson color "$COLOR_FAIL" \
            '{
              embeds: [{
                color: $color,
                author: { name: "Build failed", icon_url: $icon },
                title: "View pipeline logs",
                url: $url,
                description: $desc,
                footer: { text: $footer },
                timestamp: $timestamp
              }]
            }' > build_fail.json

          WEBHOOK_ENDPOINT="${WEBHOOK_URL}/messages/${MSG_ID}"
          if [ -n "$THREAD_ID" ]; then WEBHOOK_ENDPOINT="${WEBHOOK_URL}/messages/${MSG_ID}?thread_id=${THREAD_ID}"; fi
          curl -sS -X PATCH -H "Content-Type: application/json" -d @build_fail.json "$WEBHOOK_ENDPOINT"

      - name: Upload JAR artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PageLore-Build
          path: build/libs/*.jar
          retention-days: 7
