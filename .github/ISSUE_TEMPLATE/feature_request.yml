name: Feature request
description: Suggest an improvement for PageLore.
title: "[Feature]: "
labels: [ "enhancement" ]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Describe what you are trying to do.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior you want PageLore to add.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: folia
    attributes:
      label: Should this support Folia?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true
