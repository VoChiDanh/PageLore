# ========================================== #
#            PAGELORE CONFIGURATION          #
# ========================================== #

settings:
  # The exact lore line that splits an item into pages.
  # Keep this plain and uncolored so item plugins can write it reliably.
  page-separator: "{page}"

  # Permission required to use PageLore admin commands.
  permission: "pagelore.admin"

  # Plays feedback when a player changes page or toggles full lore mode.
  play-sound: true
  # Minecraft sound key. Use namespaced-key style or enum-style text; both are normalized.
  sound-type: "ui.button.click"
  sound-volume: 1.0
  sound-pitch: 1.0

  # Prints requirement parsing details to the console when enabled.
  debug: false

  # Inventory refresh interval in ticks for PlaceholderAPI-powered lore.
  # 20 ticks = 1 second. Set to 0 to disable automatic refreshes.
  auto-update-interval: 20

  # Delay in ticks before forcing a client inventory refresh after special clicks.
  desync-fix-delay-ticks: 1

  # Packet lore cache. Short expiry keeps PlaceholderAPI values fresh without reprocessing every packet.
  cache:
    expire-time-seconds: 1
    maximum-size: 5000

  # Cooldown settings for turning pages to reduce macro spam and packet churn.
  cooldown:
    enabled: true
    # Duration in seconds. Decimals are supported.
    time: 0.5

    # Available options: CHAT, ACTION_BAR, TITLE, SUBTITLE.
    message-type: "ACTION_BAR"

    # Minimum time between repeated cooldown messages in milliseconds.
    message-throttle-ms: 1000

    # Title timings are measured in ticks.
    title-settings:
      fade-in: 10
      stay: 40
      fade-out: 10

# Configure the inputs used to control lore pages.
# Valid values are Bukkit ClickType names:
# LEFT, RIGHT, SHIFT_LEFT, SHIFT_RIGHT, WINDOW_BORDER_LEFT, WINDOW_BORDER_RIGHT,
# MIDDLE, NUMBER_KEY, DOUBLE_CLICK, DROP, CONTROL_DROP, SWAP_OFFHAND.
controls:
  # Goes to the next page and loops back to page 1.
  next-page:
    - "SWAP_OFFHAND"
  # Goes to the previous page and loops to the last page when needed.
  previous-page:
    - "SHIFT_RIGHT"
  # Shows all pages at once and hides separator lines until toggled again.
  full-lore:
    - "MIDDLE"

# Requirement parser for dynamic lore checks.
# Format: {check:{papi:placeholder}>=value}
# Example: {check:{papi:mmocore_level}>=105} Combat Level
requirements:
  # Text inserted when a requirement is met.
  # Supports MiniMessage formats such as <green>, <bold>, and <#55ff55>.
  met-symbol: "<green>✔"

  # Text inserted when a requirement is not met.
  # Supports MiniMessage formats such as <dark_gray> and <strikethrough>.
  unmet-symbol: "<dark_gray>✘"

# Advanced parser settings. Change these only if another plugin conflicts with the default tags.
advanced:
  papi-tag: "{papi:"
  check-tag: "{check:"
  nbt-page-key: "current_page"
  nbt-full-lore-key: "show_full_lore"
