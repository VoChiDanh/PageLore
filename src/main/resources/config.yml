# ========================================== #
#            PAGELORE CONFIGURATION          #
# ========================================== #

settings:
  # The exact string used in your item's lore to split it into pages.
  # Recommendation: Keep it plain, do not use colors here.
  page-separator: "{page}"

  # Permission required to use admin commands
  permission: "pagelore.admin"

  # Should the plugin play a sound when navigating pages? (true/false)
  play-sound: true
  # Sound type from Bukkit Sound Enum. Example: UI_BUTTON_CLICK, ENTITY_BAT_TAKEOFF
  sound-type: "ui.button.click"
  sound-volume: 1.0
  sound-pitch: 1.0

  # Set to true to print PlaceholderAPI checking values in the console.
  debug: false

  # Automatic inventory refresh time for PAPI updates (In Ticks. 20 ticks = 1 second)
  # Recommendation: Set to 20 (1 second) or 60 (3 seconds) for optimal results.
  auto-update-interval: 20

  # Desync fix delay when interacting with special clicks like SWAP_OFFHAND (ticks)
  desync-fix-delay-ticks: 1

  # Memory & Performance optimization caching
  cache:
    expire-time-seconds: 1
    maximum-size: 5000

  # Cooldown settings for turning pages to prevent macro/spam abuse and lag.
  cooldown:
    # Set to true to enable the cooldown, false to disable.
    enabled: true
    # Cooldown duration in seconds (Can use decimals, e.g., 0.5 for half a second).
    time: 0.5

    # Where should the cooldown message be displayed?
    # Available options: CHAT, ACTION_BAR, TITLE, SUBTITLE
    # Recommendation: ACTION_BAR is the least intrusive.
    message-type: "ACTION_BAR"

    # Delay between consecutive cooldown messages in milliseconds (1000 = 1 second)
    message-throttle-ms: 1000

    # Advanced settings specifically for TITLE and SUBTITLE modes.
    # Measured in ticks (20 ticks = 1 second).
    title-settings:
      fade-in: 10
      stay: 40
      fade-out: 10

# Configure the inputs used to turn pages.
# Valid options include:
# LEFT, RIGHT, SHIFT_LEFT, SHIFT_RIGHT, WINDOW_BORDER_LEFT, WINDOW_BORDER_RIGHT, MIDDLE, NUMBER_KEY, DOUBLE_CLICK, DROP, CONTROL_DROP, SWAP_OFFHAND
# Note: "SWAP_OFFHAND" is triggered by pressing the 'F' key while hovering over the item.
controls:
  # Inputs to go to the NEXT page (It will loop back to page 1 automatically)
  next-page:
    - "SWAP_OFFHAND"
  # Inputs to go to the PREVIOUS page
  previous-page:
    - "SHIFT_RIGHT"
  # Inputs to toggle full lore mode for the hovered item.
  # Full lore mode shows every lore section at once and hides the page separator lines.
  full-lore:
    - "MIDDLE"

# Logic parsing for placeholders, allowing dynamic item requirements
# Usage in lore: {check:{papi:placeholder}>=value}
# Example: {check:{papi:mmocore_level}>=105} Combat Level
requirements:
  # Symbol shown when the requirement is MET.
  # Supports MiniMessage formats like <green>, <bold>, <#HexColor>
  met-symbol: "<green>✔"

  # Symbol shown when the requirement is NOT MET.
  # Supports MiniMessage formats like <dark_gray>, <strikethrough>
  unmet-symbol: "<dark_gray>✘"

# Advanced parsing settings to modify the internal tags used by the plugin.
# Only change these if they conflict with other plugins.
advanced:
  papi-tag: "{papi:"
  check-tag: "{check:"
  nbt-page-key: "current_page"
  nbt-full-lore-key: "show_full_lore"
